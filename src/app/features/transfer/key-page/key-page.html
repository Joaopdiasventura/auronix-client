<section class="page-shell">
  <app-page-header
    description="Digite uma chave, cole um link do app ou leia um QR code para seguir ao fluxo correto de transferência."
    kicker="Transferências"
    title="Transferir"
  >
    <a class="button button--ghost" pageHeaderActions routerLink="/transfer">Voltar ao extrato</a>
  </app-page-header>

  <section class="transfer-key-layout">
    <form class="transfer-key-form surface-card" (submit)="submit($event)" novalidate>
      <div class="transfer-key-form__copy">
        <span class="section-kicker">Entrada única</span>
        <h2 class="section-title">Cole um link, e-mail ou identificador de cobrança</h2>
        <p class="section-copy">
          O fluxo reconhece automaticamente a entrada e abre a transferência direta ou a confirmação
          vinculada à cobrança.
        </p>
      </div>

      @if (errorMessage()) {
        <div class="alert alert--error" aria-live="polite">
          <p>{{ errorMessage() }}</p>
        </div>
      }

      <app-input
        autocomplete="off"
        hint="Aceita link do app, e-mail da conta ou identificador UUID de cobrança."
        label="Chave de transferência"
        name="key"
        placeholder="https://app.auronix.com/transfer/key?... ou maria@empresa.com"
        [formField]="transferKeyForm.key"
      />

      <div class="action-row">
        <button class="button button--primary" type="submit">Continuar</button>
        <a class="button button--secondary" routerLink="/transfer/scan">Abrir scanner</a>
      </div>
    </form>
  </section>
</section>
