<article
  class="metric-card"
  [class.metric-card--info]="tone() == 'info'"
  [class.metric-card--negative]="tone() == 'negative'"
  [class.metric-card--positive]="tone() == 'positive'"
>
  <span class="metric-card__label">{{ label() }}</span>
  <strong class="metric-card__value">{{ value() }}</strong>
  <p class="metric-card__helper">{{ helper() }}</p>
</article>
